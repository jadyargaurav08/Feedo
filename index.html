<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main class="login-card">
        <p class="eyebrow">Gaurav</p>
        <h1>Sign in to Feedo</h1>

        <form id="loginForm" novalidate>
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
                <p id="emailError" class="error-text">Enter a valid email.</p>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <div class="password-wrap">
                    <input type="password" id="password" placeholder="Enter password" required>
                    <button type="button" id="togglePassword" class="icon-btn" title="Show password">
                        <svg viewBox="0 0 24 24" focusable="false">
                            <path class="eye-open" d="M12 5C7 5 2.7 8.1 1 12c1.7 3.9 6 7 11 7s9.3-3.1 11-7c-1.7-3.9-6-7-11-7zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"></path>
                            <path class="eye-closed" d="M3 4.3 1.6 5.7l3 3A12.6 12.6 0 0 0 1 12c1.7 3.9 6 7 11 7 2 0 3.9-.5 5.5-1.2l3 3 1.4-1.4L3 4.3zM8.8 12a3.2 3.2 0 0 1 4.2-3l2.8 2.8a3.2 3.2 0 0 1-4.2 4.2L8.8 13a3.2 3.2 0 0 1 0-1zm8.7 1.3-1.8-1.8a3.9 3.9 0 0 0-3.2-3.2L9.8 5.6c.7-.2 1.4-.3 2.2-.3 5 0 9.3 3.1 11 6.7-.8 1.9-2.2 3.5-3.9 4.6l-1.6-1.6z"></path>
                        </svg>
                    </button>
                </div>
                <p id="passwordError" class="error-text">Password must be at least 6 characters.</p>
            </div>

            <p class="forgot-row"><a href="#">Forgot password?</a></p>

            <button type="submit" class="submit-btn">Sign In</button>
            <p id="loginMessage" class="message"></p>
            <p class="create-row">Don't have an account? <a href="create-account.html">Create account</a></p>
        </form>
    </main>

    <script src="js/script.js"></script>
</body>

</html>
